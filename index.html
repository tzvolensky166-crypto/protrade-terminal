<!DOCTYPE html>
<html lang="sk" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tomáš Zvolenský - ProTrade Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { tradeBg: '#0b0e11', tradePanel: '#181a20', tradeBorder: '#2b3139', win: '#0ecb81', loss: '#f6465d' } }
            }
        };
    </script>
    <style>
        body { background-color: #0b0e11; color: #EAECEF; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden; }
        .flash-up { animation: flashG 0.6s ease-out; }
        .flash-down { animation: flashR 0.6s ease-out; }
        @keyframes flashG { 0% { color: #0ecb81; } 100% { color: inherit; } }
        @keyframes flashR { 0% { color: #f6465d; } 100% { color: inherit; } }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background-color: #2b3139; border-radius: 2px; }
        select, input, button { position: relative; z-index: 50; } /* Oprava blokovania kliknutia */
    </style>
</head>
<body class="min-h-screen flex flex-col text-sm">

    <!-- Top Navigation -->
    <header class="bg-tradePanel py-2 px-3 border-b border-tradeBorder flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 sticky top-0 z-40">
        <div class="flex justify-between w-full sm:w-auto">
            <h1 class="text-lg font-bold text-yellow-500 tracking-wider">PRO<span class="text-white">TRADE</span></h1>
            <span class="text-gray-400 font-medium sm:ml-4">Účet: <span class="text-white">Tomáš Zvolenský</span></span>
        </div>
        <div class="flex justify-between w-full sm:w-auto gap-4 border-t border-tradeBorder sm:border-t-0 pt-2 sm:pt-0">
            <div>
                <p class="text-[10px] text-gray-400">Equity (Celkom)</p>
                <p class="text-base font-bold text-white" id="equityDisplay">0.00 €</p>
            </div>
            <div class="text-right border-l border-tradeBorder pl-4">
                <p class="text-[10px] text-gray-400">Voľná Marža</p>
                <p class="text-base font-bold text-yellow-500" id="balanceDisplay">0.00 €</p>
            </div>
        </div>
    </header>

    <main class="flex-grow p-2 space-y-2 pb-20"> <!-- pb-20 kvoli mobilom -->
        
        <!-- Chart Area -->
        <div class="bg-tradePanel rounded border border-tradeBorder flex flex-col relative min-h-[300px]">
            <div class="p-2 border-b border-tradeBorder flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <h2 class="text-lg font-bold" id="chartTitle">BTC/EUR</h2>
                    <span id="chartPrice" class="text-base font-mono font-bold">...</span>
                </div>
            </div>
            <div id="tvchart" class="flex-grow w-full h-[250px]"></div>
        </div>

        <!-- Trading Panel -->
        <div class="bg-tradePanel rounded border border-tradeBorder p-3 relative z-30">
            <div class="flex flex-col sm:flex-row gap-3">
                <div class="flex-1">
                    <label class="text-xs text-gray-400 mb-1 block">Vyberte aktívum</label>
                    <select id="assetSelect" class="w-full bg-tradeBg border border-tradeBorder rounded px-3 py-3 text-base text-white outline-none focus:border-yellow-500 cursor-pointer">
                        <optgroup label="Krypto">
                            <option value="BTC">Bitcoin (BTC)</option>
                            <option value="ETH">Ethereum (ETH)</option>
                            <option value="SOL">Solana (SOL)</option>
                        </optgroup>
                        <optgroup label="Akcie">
                            <option value="AAPL">Apple (AAPL)</option>
                            <option value="TSLA">Tesla (TSLA)</option>
                            <option value="NVDA">Nvidia (NVDA)</option>
                        </optgroup>
                        <optgroup label="Komodity">
                            <option value="GOLD">Zlato (GOLD)</option>
                        </optgroup>
                    </select>
                </div>
                <div class="flex-1">
                    <label class="text-xs text-gray-400 mb-1 block">Suma (EUR)</label>
                    <input type="number" id="buyAmount" class="w-full bg-tradeBg border border-tradeBorder rounded px-3 py-3 text-base text-white outline-none focus:border-yellow-500" placeholder="Zadajte sumu..." value="1000">
                </div>
            </div>
            <button onclick="buyAsset()" type="button" class="w-full mt-4 bg-win hover:bg-[#0b9e65] active:bg-[#087a4e] text-white font-bold py-3 rounded transition shadow-lg text-lg cursor-pointer">KÚPIŤ (LONG)</button>
        </div>

        <!-- Portfolio -->
        <div class="bg-tradePanel rounded border border-tradeBorder flex flex-col min-h-[150px]">
            <div class="p-2 border-b border-tradeBorder flex justify-between items-center">
                <h2 class="font-semibold text-gray-200">Otvorené pozície</h2>
                <button onclick="resetData()" class="text-xs text-gray-500 hover:text-red-500 bg-transparent border-none cursor-pointer">Reset</button>
            </div>
            <div id="portfolioList" class="p-2 space-y-2">
                <p class="text-xs text-gray-500 text-center py-4">Nemáš otvorené žiadne pozície</p>
            </div>
        </div>

        <!-- History -->
        <div class="bg-tradePanel rounded border border-tradeBorder flex flex-col">
            <div class="p-2 border-b border-tradeBorder">
                <h2 class="font-semibold text-gray-200">História</h2>
            </div>
            <div class="overflow-x-auto p-2">
                <table class="w-full text-left text-[11px] whitespace-nowrap">
                    <thead class="text-gray-500">
                        <tr><th class="pr-2 pb-1">Čas</th><th class="pr-2 pb-1">Pár</th><th class="pr-2 pb-1">Typ</th><th class="pr-2 pb-1">Objem (€)</th><th class="pb-1">Cena</th></tr>
                    </thead>
                    <tbody id="historyList" class="font-mono"></tbody>
                </table>
            </div>
        </div>
        
        <!-- Markets List -->
        <div class="bg-tradePanel rounded border border-tradeBorder flex flex-col mt-4">
            <div class="p-2 border-b border-tradeBorder">
                <h2 class="font-semibold text-gray-200">Živé trhy</h2>
            </div>
            <div id="marketsList" class="p-2 grid grid-cols-2 gap-2">
                <!-- Vykresľované cez JS -->
            </div>
        </div>

    </main>

    <script>
        const assetsData = {
            'Krypto': ['BTC', 'ETH', 'SOL'],
            'Akcie': ['AAPL', 'TSLA', 'NVDA'],
            'Komodity': ['GOLD']
        };
        const basePrices = { AAPL: 165.20, TSLA: 195.50, NVDA: 820.10, GOLD: 2150.00 };
        
        let prices = { ...basePrices };
        let activeChartAsset = 'BTC';

        let state = JSON.parse(localStorage.getItem('proTradeDataV2')) || { 
            balance: 25000.00, 
            portfolio: {}, 
            history: [] 
        };

        const formatMoney = (amount) => new Intl.NumberFormat('sk-SK', { style: 'currency', currency: 'EUR' }).format(amount || 0);
        
        function saveData() {
            localStorage.setItem('proTradeDataV2', JSON.stringify(state));
            updateUI();
        }

        function resetData() {
            if(confirm('Vymazať históriu a resetovať na 25 000€?')) {
                state = { balance: 25000.00, portfolio: {}, history: [] };
                saveData();
            }
        }

        // CHARTING
        let chart, candleSeries;
        function initTradingView() {
            const chartContainer = document.getElementById('tvchart');
            if(!chartContainer) return;
            
            chart = LightweightCharts.createChart(chartContainer, {
                layout: { background: { type: 'solid', color: '#181a20' }, textColor: '#848E9C' },
                grid: { vertLines: { color: '#2b3139' }, horzLines: { color: '#2b3139' } },
                crosshair: { mode: 0 },
                timeScale: { timeVisible: true, secondsVisible: false },
            });
            candleSeries = chart.addCandlestickSeries({ upColor: '#0ecb81', downColor: '#f6465d', borderVisible: false, wickUpColor: '#0ecb81', wickDownColor: '#f6465d' });
            
            new ResizeObserver(() => { 
                if(chartContainer.clientWidth > 0) {
                    chart.applyOptions({ width: chartContainer.clientWidth, height: chartContainer.clientHeight }); 
                }
            }).observe(chartContainer);
        }

        let currentBar = { open: 0, high: 0, low: 0, close: 0, time: 0 };
        function updateChart(price) {
            if(!candleSeries) return;
            const time = Math.floor(Date.now() / 1000);
            if (currentBar.time === 0 || time - currentBar.time >= 60) { 
                currentBar = { time, open: price, high: price, low: price, close: price };
            } else {
                currentBar.close = price;
                currentBar.high = Math.max(currentBar.high, price);
                currentBar.low = Math.min(currentBar.low, price);
            }
            try { candleSeries.update(currentBar); } catch(e){}
        }

        function switchChart(asset) {
            activeChartAsset = asset;
            document.getElementById('chartTitle').innerText = `${asset}/EUR`;
            document.getElementById('assetSelect').value = asset;
            currentBar = { open: 0, high: 0, low: 0, close: 0, time: 0 }; // reset sviečok pre nový graf
        }

        // Zabezpečenie zmeny v roletke prepne graf
        document.getElementById('assetSelect').addEventListener('change', function() {
            switchChart(this.value);
        });

        // TRADING
        window.buyAsset = function() { // Exponované do globálneho objektu
            const select = document.getElementById('assetSelect');
            const input = document.getElementById('buyAmount');
            
            if(!select || !input) return;
            
            const asset = select.value;
            const eurAmount = parseFloat(input.value);
            const currentPrice = prices[asset];

            if (eurAmount > 0 && eurAmount <= state.balance && currentPrice > 0) {
                state.balance -= eurAmount;
                const amountBought = eurAmount / currentPrice;
                
                if (!state.portfolio[asset]) {
                    state.portfolio[asset] = { amount: amountBought, avgPrice: currentPrice };
                } else {
                    const totalEur = (state.portfolio[asset].amount * state.portfolio[asset].avgPrice) + eurAmount;
                    state.portfolio[asset].amount += amountBought;
                    state.portfolio[asset].avgPrice = totalEur / state.portfolio[asset].amount;
                }
                
                const time = new Date().toLocaleTimeString('sk-SK');
                state.history.unshift({ time, asset, type: 'BUY', eurAmount, price: currentPrice });
                if(state.history.length > 50) state.history.pop();
                
                saveData();
            } else {
                alert('Neplatná suma alebo nedostatok prostriedkov.');
            }
        };

        window.sellAsset = function(asset) {
            const pos = state.portfolio[asset];
            const currentPrice = prices[asset];
            if (pos && pos.amount > 0 && currentPrice > 0) {
                const valueEur = pos.amount * currentPrice;
                state.balance += valueEur;
                
                const time = new Date().toLocaleTimeString('sk-SK');
                state.history.unshift({ time, asset, type: 'SELL', eurAmount: valueEur, price: currentPrice });
                
                delete state.portfolio[asset];
                saveData();
            }
        };

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = formatMoney(state.balance);
            const portDiv = document.getElementById('portfolioList');
            const histDiv = document.getElementById('historyList');
            portDiv.innerHTML = '';
            histDiv.innerHTML = '';
            
            let totalEquity = state.balance;

            for (const [coin, pos] of Object.entries(state.portfolio)) {
                const currentPrice = prices[coin] || pos.avgPrice;
                const currentValue = pos.amount * currentPrice;
                const pl = currentValue - (pos.amount * pos.avgPrice);
                totalEquity += currentValue;
                
                const plClass = pl >= 0 ? 'text-win' : 'text-loss';
                
                portDiv.innerHTML += `
                    <div class="bg-tradeBg p-3 rounded border border-tradeBorder mb-2">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-white">${coin}</span>
                            <span class="text-[10px] text-gray-400">${pos.amount.toFixed(4)} ks</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-sm font-bold text-white">${formatMoney(currentValue)}</p>
                                <p class="text-[10px] ${plClass}">${pl >= 0 ? '+' : ''}${formatMoney(pl)}</p>
                            </div>
                            <button onclick="sellAsset('${coin}')" type="button" class="bg-tradePanel border border-loss text-loss px-3 py-1 rounded text-xs">ZAVRIEŤ</button>
                        </div>
                    </div>
                `;
            }
            if(portDiv.innerHTML === '') portDiv.innerHTML = '<p class="text-xs text-gray-500 text-center py-2">Nemáš otvorené pozície</p>';
            document.getElementById('equityDisplay').innerText = formatMoney(totalEquity);

            state.history.forEach(h => {
                const color = h.type === 'BUY' ? 'text-win' : 'text-loss';
                histDiv.innerHTML += `
                    <tr class="border-b border-tradeBorder/50">
                        <td class="py-1 pr-2">${h.time}</td>
                        <td class="pr-2">${h.asset}</td>
                        <td class="${color} pr-2">${h.type}</td>
                        <td class="pr-2">${formatMoney(h.eurAmount)}</td>
                        <td class="text-gray-400">${h.price.toFixed(2)}</td>
                    </tr>
                `;
            });
        }

        const marketsDiv = document.getElementById('marketsList');
        for (const [category, items] of Object.entries(assetsData)) {
            items.forEach(item => {
                marketsDiv.innerHTML += `
                    <div onclick="switchChart('${item}')" class="bg-tradeBg p-2 rounded border border-tradeBorder cursor-pointer">
                        <div class="text-[10px] text-gray-500">${category}</div>
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-gray-300 text-xs">${item}</span>
                            <span id="price-${item}" class="font-mono text-white text-xs">---</span>
                        </div>
                    </div>
                `;
            });
        }

        function handleNewPrice(coin, newPrice) {
            const el = document.getElementById(`price-${coin}`);
            if(!el) return;
            
            if (prices[coin] && prices[coin] !== newPrice) {
                el.classList.remove('flash-up', 'flash-down');
                void el.offsetWidth; 
                if (newPrice > prices[coin]) el.classList.add('flash-up');
                else el.classList.add('flash-down');
            }
            prices[coin] = newPrice;
            el.innerText = newPrice < 10 ? newPrice.toFixed(4) : newPrice.toFixed(2);

            if(coin === activeChartAsset) {
                document.getElementById('chartPrice').innerText = el.innerText;
                updateChart(newPrice);
            }
            updateUI();
        }

        // Spustenie
        document.addEventListener('DOMContentLoaded', () => {
            initTradingView();
            updateUI();

            assetsData['Krypto'].forEach(coin => {
                prices[coin] = 0;
                const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${coin.toLowerCase()}eur@trade`);
                ws.onmessage = (event) => handleNewPrice(coin, parseFloat(JSON.parse(event.data).p));
            });

            function simulateMarket() {
                ['AAPL', 'TSLA', 'NVDA', 'GOLD'].forEach(asset => {
                    if(!prices[asset]) return;
                    handleNewPrice(asset, prices[asset] + (prices[asset] * (Math.random() * 0.001 - 0.0005)));
                });
                setTimeout(simulateMarket, 2000);
            }

            setTimeout(() => {
                ['AAPL', 'TSLA', 'NVDA', 'GOLD'].forEach(a => handleNewPrice(a, prices[a]));
                switchChart('BTC');
                simulateMarket();
            }, 1000);
        });

    </script>
</body>
</html>
